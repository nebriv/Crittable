version: 2

# Backs the "dependency intake" protocol in CLAUDE.md by surfacing new
# upstream releases as PRs we can triage instead of letting them rot.
# Cadence is weekly to keep PR noise low; bump to daily if a CVE backlog
# starts building up. Group minor/patch updates so a single PR carries
# routine bumps and majors stay isolated for hand review.

updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: backend
      include: scope
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: frontend
      include: scope
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: docker
      include: scope

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - devcontainer
    commit-message:
      prefix: devcontainer
      include: scope
