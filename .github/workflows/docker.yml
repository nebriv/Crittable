name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    # Validate the build + Trivy gate on every PR that touches the
    # runtime image, BEFORE merge. PR #135 introduced the Trivy gate
    # on push-to-main only, which meant a CVE could land on main and
    # block every subsequent push (the way it did 2026-05-03 →
    # 2026-05-05). Running the same workflow on PRs catches the
    # regression in the PR's own CI; the auth + push steps below are
    # gated on ``github.event_name == 'push'`` so PR runs build and
    # scan but never publish to GHCR.
    branches: ["main"]
    paths:
      # Anything that ends up in the image, plus the workflow itself.
      # Pure docs / design / test-only PRs don't need a Trivy scan.
      - "docker/**"
      - "backend/pyproject.toml"
      - "backend/app/**"
      - "backend/scenarios/**"
      - "frontend/**"
      - ".github/workflows/docker.yml"

permissions:
  contents: read
  packages: write
  # Required for the Trivy step's SARIF upload to GitHub Code Scanning.
  security-events: write

env:
  REGISTRY: ghcr.io
  # ``github.repository`` preserves the upstream casing (e.g.
  # ``nebriv/Crittable``). GHCR rejects uppercase characters in image
  # names, so we lowercase before passing to docker/metadata-action.
  # The shell-side conversion happens once in the ``image-name`` step
  # below; ``IMAGE_NAME`` here is just the raw input.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Only push events publish to GHCR; PR runs build + scan only.
        # Skipping the login on PRs avoids a noisy auth attempt and is
        # required for fork PRs (where ``GITHUB_TOKEN`` is read-only and
        # ``packages: write`` is downgraded).
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name (GHCR requires lowercase)
        id: image-name
        run: |
          # ``${IMAGE_NAME,,}`` is bash 4+ lowercase parameter expansion.
          # GitHub Actions' ubuntu-latest runner ships bash 5.x by
          # default so this is safe; tcsh/zsh users running locally
          # would need to swap to ``tr '[:upper:]' '[:lower:]'``.
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: First tag (Trivy needs a single ref)
        id: scan-target
        run: |
          # ``steps.meta.outputs.tags`` is a newline-separated list; Trivy
          # scans a single image ref. Pick the first tag (deterministic
          # ordering from docker/metadata-action) — every tag in the list
          # points at the same digest, so the choice is arbitrary.
          first_tag="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n1)"
          echo "ref=${first_tag}" >> "$GITHUB_OUTPUT"

      - name: Build (load locally for scan, do NOT push yet)
        # Build into the local Docker daemon with ``load: true`` so Trivy
        # can scan the resulting image before anything is published. We
        # still write the build cache so the follow-up push step is a
        # cache hit and effectively just re-tags + uploads layers.
        # ``load: true`` requires a single platform; we already pin
        # ``linux/amd64`` so this is fine.
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (table, informational) — prints CVEs to log
        # Same scan parameters as the SARIF gate below, but ``exit-code:
        # "0"`` so this step never fails the build. Its only purpose is
        # to surface the human-readable CVE table inside the Actions log
        # — the SARIF gate that follows writes findings to a file and
        # does not echo to stdout, which historically forced operators
        # to dig through the Code Scanning tab to learn *which* CVE
        # tripped the gate. With this step running first, the next
        # failed run is self-documenting in the log itself.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-target.outputs.ref }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          vuln-type: os,library

      - name: Trivy image scan (HIGH,CRITICAL) — gates the push
        # Scans the locally-loaded image for OS-package and language-dep
        # CVEs BEFORE it reaches the registry. HIGH/CRITICAL findings
        # fail this step, the push step below is skipped, and no
        # vulnerable image is ever published under ``main``/version
        # tags. ``ignore-unfixed`` keeps the gate from blocking on
        # CVEs with no upstream patch — the scheduled security.yml run
        # is the catch-all for "still no fix after a week" tracking.
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.scan-target.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          vuln-type: os,library

      - name: Upload Trivy SARIF to Code Scanning
        # Always upload, even if the scan failed — findings land in the
        # Security tab and can be triaged from there instead of
        # disappearing with the failed run.
        #
        # Only on push events: the Code Scanning view shows the current
        # state of ``main``, not pre-merge PR speculation. PR runs still
        # gate the merge via the Trivy step's exit code; we just don't
        # let PR-only findings clutter the Security tab. (Also avoids a
        # silent SARIF upload failure on fork PRs where
        # ``security-events: write`` is downgraded.)
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

      - name: Push (only if scan passed)
        # Re-runs the build with the same inputs to publish to GHCR.
        # The previous build's ``cache-to`` populated the gha cache, so
        # this is a near-instant cache hit — no real rebuild happens.
        #
        # Two gates: ``success()`` so a failed Trivy scan skips the
        # push (the original guarantee), AND
        # ``github.event_name == 'push'`` so PR runs never publish.
        # Both are required because specifying any ``if:`` overrides
        # the default ``if: success()`` GitHub Actions applies to
        # subsequent steps.
        if: success() && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
