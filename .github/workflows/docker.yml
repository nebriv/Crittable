name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # ``github.repository`` preserves the upstream casing (e.g.
  # ``nebriv/Crittable``). GHCR rejects uppercase characters in image
  # names, so we lowercase before passing to docker/metadata-action.
  # The shell-side conversion happens once in the ``image-name`` step
  # below; ``IMAGE_NAME`` here is just the raw input.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name (GHCR requires lowercase)
        id: image-name
        run: |
          # ``${IMAGE_NAME,,}`` is bash 4+ lowercase parameter expansion.
          # GitHub Actions' ubuntu-latest runner ships bash 5.x by
          # default so this is safe; tcsh/zsh users running locally
          # would need to swap to ``tr '[:upper:]' '[:lower:]'``.
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-name.outputs.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
