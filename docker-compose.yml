services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ai-tabletop-facilitator:dev
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    restart: unless-stopped
