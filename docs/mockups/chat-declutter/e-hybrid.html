<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mockup E · Hybrid (synthesis from iter-1)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">
<style>
/* Sticky minute-boundary timestamp anchor — IR Lead's ask */
.ts-anchor {
  position: sticky; top: 0; z-index: 5;
  background: linear-gradient(to bottom, #0f172a 70%, transparent);
  padding: 4px 0;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.ts-anchor::before {
  content: ""; display: inline-block; width: 100%; height: 1px;
  background: #1e293b; vertical-align: middle; margin-right: 8px;
}
/* Pinned artifacts strip across top — SOC + IR Lead ask */
.artifact-strip {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 8px 12px;
  border-bottom: 1px solid #1e293b;
  background: #0b1320;
  flex-shrink: 0;
}
.artifact-card-mini {
  flex: 0 0 220px;
  border: 1px solid #1e293b; border-left-width: 3px;
  background: #0f172a; border-radius: 4px;
  padding: 6px 8px; font-size: 11px;
  cursor: pointer;
}
.artifact-card-mini:hover { border-color: #475569; background: #1e293b; }
.artifact-card-mini .title { font-weight: 600; color: #e2e8f0; font-size: 12px; }
.artifact-card-mini .meta { color: #64748b; font-size: 10px; margin-top: 2px; }
/* Synthetic track-lifecycle row — IR Lead's ask. Renders before the first
 * message in a previously-unseen track so the AAR has a "track opened"
 * landmark instead of inferring from the first message timestamp. */
.track-open-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 6px; margin: 4px 0;
  border-left: 3px solid var(--track, #475569);
  background: rgba(255,255,255,0.02);
  font-size: 11px;
  color: #cbd5e1;
}
.track-open-row strong { color: #e2e8f0; font-weight: 600; }
.track-open-row .when { font-family: ui-monospace, monospace; color: #64748b; }

/* Hidden-by-filter @-mention summary banner — CISO ask. Shows when a
 * filter is active and there are @-mentions for the viewer that the
 * filter is hiding right now. Click to clear filters. */
.unread-cta {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  background: rgba(251, 191, 36, 0.12);
  border: 1px solid rgba(251, 191, 36, 0.45);
  color: #fde68a;
  padding: 8px 10px; border-radius: 6px;
  font-size: 12px;
}
.unread-cta button {
  background: rgba(251, 191, 36, 0.25);
  color: #fef3c7;
  padding: 3px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
  border: 1px solid rgba(251, 191, 36, 0.5);
  cursor: pointer;
}
.unread-cta button:hover { background: rgba(251, 191, 36, 0.4); }

/* Human-marked AAR-moment affordance */
.btn-mark {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  border: 1px solid #334155; background: transparent; color: #94a3b8;
  cursor: pointer;
}
.btn-mark:hover { background: #1e293b; color: #e2e8f0; border-color: #475569; }
.btn-mark.active { background: rgba(168, 85, 247, 0.15); color: #c4b5fd; border-color: #a855f7; }
/* "Since you last looked" banner — CISO ask */
.unread-banner {
  background: rgba(56, 189, 248, 0.12);
  border: 1px solid rgba(56, 189, 248, 0.4);
  color: #7dd3fc;
  padding: 6px 10px; border-radius: 4px;
  font-size: 12px; cursor: pointer;
}
</style>
</head>
<body class="text-slate-200">
<div class="flex h-screen flex-col">

<header class="flex items-center justify-between border-b border-slate-800 bg-slate-900/60 px-4 py-2">
  <div class="flex items-center gap-3">
    <span class="text-sm font-semibold text-slate-100">Crittable · Tabletop in progress</span>
    <span class="text-xs text-slate-400">Ransomware · turn 7/12</span>
    <span class="ml-2 rounded bg-emerald-900/60 px-2 py-0.5 text-[10px] font-semibold text-emerald-200">HYBRID — synthesis from iter 1</span>
  </div>
  <div class="flex items-center gap-3 text-xs">
    <button id="btn-export-timeline" class="rounded border border-slate-700 bg-slate-800 px-2 py-1 text-slate-200 hover:border-slate-500" title="Export AAR-ready timeline (anchors + injects + decisions + artifacts)">Export timeline (md)</button>
    <button id="btn-export-full" class="rounded border border-slate-700 bg-slate-800 px-2 py-1 text-slate-200 hover:border-slate-500" title="Export full chronological record">Export full record (md)</button>
    <span class="text-slate-400">Viewing as</span>
    <select id="viewer-switcher" class="rounded border border-slate-700 bg-slate-800 px-2 py-1 text-slate-100"></select>
    <a href="index.html" class="text-sky-400 hover:underline">← all mockups</a>
  </div>
</header>

<!-- Pinned artifacts strip — surfaces every pinned card across all tracks -->
<div class="artifact-strip" id="artifact-strip"></div>

<div class="flex flex-1 min-h-0">
  <!-- Center: filter row, optional unread banner, chat -->
  <main class="flex flex-1 min-w-0 flex-col">
    <!-- Filter row — track pill AND-s with quality filter, both can be active -->
    <div class="flex flex-wrap items-center gap-2 border-b border-slate-800 bg-slate-900/40 px-3 py-2">
      <span class="text-[11px] uppercase tracking-wide text-slate-500">Show</span>
      <button class="pill" data-filter="all" data-active="1">All <span class="count" id="cnt-all"></span></button>
      <button class="pill" data-filter="me">@Me <span class="count" id="cnt-me"></span></button>
      <button class="pill" data-filter="critical">Critical <span class="count" id="cnt-critical"></span></button>
      <button class="pill" data-filter="decisions">Decisions <span class="count" id="cnt-decisions"></span></button>
      <span class="mx-2 h-4 w-px bg-slate-700"></span>
      <span class="text-[11px] uppercase tracking-wide text-slate-500">AND track</span>
      <button class="pill" data-track="containment"><span style="color:#f43f5e">●</span> Containment</button>
      <button class="pill" data-track="disclosure"><span style="color:#f59e0b">●</span> Disclosure</button>
      <button class="pill" data-track="comms"><span style="color:#ec4899">●</span> Comms</button>
      <button class="pill" data-track="lateral"><span style="color:#14b8a6">●</span> Lateral</button>
      <span class="ml-auto text-[11px] text-slate-500" id="filter-summary">All messages</span>
    </div>

    <!-- "Since you last looked" banner — flashes after a filter change with the count of newly visible @-mentions -->
    <div id="unread-banner" class="m-3 hidden"></div>

    <!-- Chat scroll -->
    <div id="chat" class="flex-1 min-h-0 overflow-y-auto px-3 py-3 space-y-1"></div>

    <!-- Composer -->
    <div class="border-t border-slate-800 bg-slate-900/40 p-3">
      <div class="flex gap-2">
        <input class="flex-1 rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm placeholder-slate-500" placeholder="Type a reply…">
        <button class="rounded bg-sky-600 px-4 text-sm font-medium text-white hover:bg-sky-500">Send</button>
      </div>
    </div>
  </main>

  <!-- Right rail: Artifacts | Decisions | Action items | Critical -->
  <aside class="w-80 flex-shrink-0 border-l border-slate-800 bg-slate-900/30 flex flex-col min-h-0">
    <div class="flex border-b border-slate-800 text-[11px]">
      <button class="rail-tab flex-1 px-2 py-2 font-semibold text-slate-100 border-b-2 border-sky-500" data-rail="artifacts">Artifacts</button>
      <button class="rail-tab flex-1 px-2 py-2 text-slate-400 hover:text-slate-200" data-rail="decisions">Decisions</button>
      <button class="rail-tab flex-1 px-2 py-2 text-slate-400 hover:text-slate-200" data-rail="actions">Action items</button>
      <button class="rail-tab flex-1 px-2 py-2 text-slate-400 hover:text-slate-200" data-rail="critical">Critical</button>
    </div>
    <div id="rail-body" class="flex-1 min-h-0 overflow-y-auto p-3 space-y-2"></div>
  </aside>
</div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
let state = {
  filter: "all",
  // SOC iter-2 ask: track pills are multi-select. Empty Set = no track filter
  // (everything passes); non-empty = message must belong to one of the picked
  // tracks. Replaces the prior single-string trackFilter.
  trackFilter: new Set(),
  rail: "artifacts",
  // Human-marked AAR moments — what counts as a decision worth citing in the
  // post-incident write-up. CISO and IR both asked for an attributed primitive
  // (decider + ts + jump-to-message) so the post-mortem doesn't depend on
  // memory. Pre-seeded with three obvious-in-retrospect calls to demonstrate.
  humanDecisions: {
    m21: { decider: "ir",   ts: "14:36:55" },
    m25: { decider: "ciso", ts: "14:37:50" },
    m37: { decider: "ciso", ts: "14:41:20" },
  },
  // Action items extracted by IR-Lead role. Each entry is a tracked TODO
  // surfaced in the rail so they don't get lost in chat scroll.
  actionItems: [
    { id: "a1", msgId: "m28", owner: "ir",    text: "Call retainer counsel + cyber-insurance carrier by EOD",   status: "open" },
    { id: "a2", msgId: "m26", owner: "soc2",  text: "Memory + disk image FS-CORP-{02,03,07,11} before reimage", status: "in_progress" },
    { id: "a3", msgId: "m31", owner: "soc1",  text: "Containment hunt — verify persistence cleared on FS-CORP-07", status: "open" },
    { id: "a4", msgId: "m37", owner: "comms", text: "Ship holding-statement option B; route via Legal review",   status: "in_progress" },
  ],
};

function tsMinute(ts) { return ts.slice(0, 5); } // "14:30:02" -> "14:30"

function chatItem(m, prevMinute) {
  const role = byRole(m.from) || { label: "System", color: "slate" };
  const [bg, bd, tx] = tailwindColor(role.color);
  const trackHex = trackColorHex(m.track);
  const isMe = isAddressedToMe(m, VIEWER);
  const isCritical = m.kind === "critical";
  const minute = tsMinute(m.ts);
  // Sticky minute-anchor row when minute changes
  const anchor = (minute !== prevMinute) ? `<div class="ts-anchor">${minute}</div>` : "";
  const isHumanDecision = !!state.humanDecisions[m.id];
  const ringCls = isMe && (m.kind === "ai_text" || isCritical) ? "awaiting-me" : "";
  const critCls = isCritical ? "border-red-500/60 bg-red-950/40" : "border-slate-800 bg-slate-900/40";
  const meBadge = isMe ? `<span class="ml-2 rounded bg-amber-500/20 px-1.5 py-0.5 text-[10px] font-semibold text-amber-200">@you</span>` : "";
  const decBadge = isHumanDecision
    ? `<span class="ml-2 rounded border border-violet-500/60 bg-violet-900/40 px-1.5 py-0.5 text-[10px] font-semibold text-violet-200" title="Marked AAR moment by ${(byRole(state.humanDecisions[m.id].decider)||{}).label} at ${state.humanDecisions[m.id].ts}">DECISION · ${(byRole(state.humanDecisions[m.id].decider)||{}).short}</span>`
    : "";
  const critBadge = isCritical ? `<span class="ml-2 rounded border border-red-500/60 bg-red-900/40 px-1.5 py-0.5 text-[10px] font-semibold text-red-200">INJECT</span>` : "";
  // Mark-as-decision is available to anyone — it's an AAR-curation primitive,
  // not a litigation artifact. Anyone in the exercise can flag a moment they
  // think the post-mortem should call out, and the click stamps decider + ts.
  const decisionBtn = `<button class="btn-mark ${isHumanDecision ? "active" : ""}" onclick="toggleDecision('${m.id}')">${isHumanDecision ? "✓ AAR moment" : "+ mark for AAR"}</button>`;
  return anchor + `
    <article id="msg-${m.id}" class="flex gap-3 rounded border ${critCls} ${ringCls} p-3"
      data-mid="${m.id}" data-track="${m.track}" data-me="${isMe?1:0}"
      data-critical="${isCritical?1:0}" data-decision="${isHumanDecision?1:0}">
      <div class="track-bar" style="background:${trackHex}"></div>
      <div class="avatar ${bg} ${bd} ${tx} border">${initials(role)}</div>
      <div class="min-w-0 flex-1">
        <header class="flex flex-wrap items-center justify-between gap-2 text-[11px] uppercase tracking-wide text-slate-400">
          <span class="flex flex-wrap items-center gap-1">
            <span class="font-semibold text-slate-200">${actorLabel(role)}</span>
            <span class="track-chip track-${m.track}">${trackInfo(m.track).label}</span>
            ${meBadge}${decBadge}${critBadge}
          </span>
          <span class="font-mono text-slate-500">${m.ts}</span>
        </header>
        <p class="mt-1 whitespace-pre-wrap text-sm leading-relaxed">${renderBody(m, VIEWER)}</p>
        <div class="mt-2 flex items-center gap-2">${decisionBtn}</div>
      </div>
    </article>`;
}

function renderArtifactStrip() {
  const cards = pinnedCards();
  document.getElementById("artifact-strip").innerHTML = cards.length
    ? cards.map((c) => {
        const r = byRole(c.from);
        return `<div class="artifact-card-mini" style="border-left-color:${trackColorHex(c.track)}" onclick="scrollToMsg('${c.msgId}')">
          <div class="title">${c.title}</div>
          <div class="text-[11px] text-slate-300 mt-0.5">${c.body}</div>
          <div class="meta">${c.ts} · ${r ? r.label : "?"} · #${c.track}</div>
        </div>`;
      }).join("")
    : `<span class="text-xs text-slate-500 px-2 py-1">No artifacts pinned yet.</span>`;
}

// Render a synthetic "[#track opened by ROLE at HH:MM:SS]" row before the
// first message in each track. IR Lead's iter-2 ask: don't make me infer
// track origin from message timestamps.
function trackOpenRow(m) {
  const r = byRole(m.from) || { label: "System" };
  const t = trackInfo(m.track);
  const hex = trackColorHex(m.track);
  return `<div class="track-open-row" style="--track:${hex}" data-track="${m.track}" data-track-open="1">
    <span class="track-chip track-${m.track}">${t.label}</span>
    <span><strong>opened</strong> by ${actorLabel(r)}</span>
    <span class="when">at ${m.ts}</span>
  </div>`;
}

function renderChat() {
  let prevMinute = "";
  const seenTracks = new Set();
  const html = MESSAGES.map((m) => {
    let openRow = "";
    if (m.track !== "main" && !seenTracks.has(m.track)) {
      seenTracks.add(m.track);
      openRow = trackOpenRow(m);
    }
    const out = chatItem(m, prevMinute);
    prevMinute = tsMinute(m.ts);
    return openRow + out;
  }).join("");
  document.getElementById("chat").innerHTML = html;
  applyFilters();
}

function applyFilters() {
  const items = document.querySelectorAll("#chat > article");
  let cAll = 0, cMe = 0, cCrit = 0, cDec = 0, cVisible = 0;
  let hiddenMentions = 0;
  const hiddenTracksWithMe = new Set();
  items.forEach((el) => {
    const me = el.dataset.me === "1";
    const crit = el.dataset.critical === "1";
    const dec = el.dataset.decision === "1";
    const trk = el.dataset.track;
    cAll++; if (me) cMe++; if (crit) cCrit++; if (dec) cDec++;
    let show = true;
    if (state.filter === "me" && !me) show = false;
    if (state.filter === "critical" && !crit) show = false;
    if (state.filter === "decisions" && !dec) show = false;
    if (state.trackFilter.size > 0 && !state.trackFilter.has(trk)) show = false;
    el.classList.toggle("hidden-by-filter", !show);
    if (show) cVisible++;
    if (!show && me) { hiddenMentions++; hiddenTracksWithMe.add(trk); }
  });
  // Hide synthetic track-open rows that reference a track currently filtered out.
  document.querySelectorAll('[data-track-open="1"]').forEach((el) => {
    const trk = el.dataset.track;
    const hide = state.trackFilter.size > 0 && !state.trackFilter.has(trk);
    el.classList.toggle("hidden-by-filter", hide);
  });
  document.getElementById("cnt-all").textContent = cAll;
  document.getElementById("cnt-me").textContent = cMe;
  document.getElementById("cnt-critical").textContent = cCrit;
  document.getElementById("cnt-decisions").textContent = cDec;
  // Filter summary line — uses AND-joined parts so a CISO with 3 of 47 visible
  // messages can read why at a glance.
  const parts = [];
  if (state.filter !== "all") parts.push(state.filter);
  if (state.trackFilter.size > 0) parts.push([...state.trackFilter].map((t) => "#" + t).join(" + "));
  document.getElementById("filter-summary").textContent =
    parts.length ? `${cVisible} of ${cAll} · ${parts.join(" + ")}` : `${cAll} messages`;
  // Unread-mentions banner: surfaces @-mentions hidden by the active filter.
  // Click to clear filters.
  const banner = document.getElementById("unread-banner");
  if (hiddenMentions > 0) {
    const tracks = [...hiddenTracksWithMe].map((t) => "#" + t).join(", ");
    banner.className = "m-3";
    banner.innerHTML = `<div class="unread-cta">
      <span><strong>${hiddenMentions}</strong> @-mention${hiddenMentions === 1 ? "" : "s"} for you hidden by the current filter (${tracks}).</span>
      <button onclick="clearFilters()">Show all</button>
    </div>`;
  } else {
    banner.className = "m-3 hidden";
    banner.innerHTML = "";
  }
}

function clearFilters() {
  state.filter = "all";
  state.trackFilter = new Set();
  document.querySelectorAll(".pill[data-filter]").forEach((b) => b.dataset.active = b.dataset.filter === "all" ? "1" : "0");
  document.querySelectorAll(".pill[data-track]").forEach((b) => b.dataset.active = "0");
  applyFilters();
}
window.clearFilters = clearFilters;

function renderRail() {
  const body = document.getElementById("rail-body");
  if (state.rail === "artifacts") {
    body.innerHTML = pinnedCards().map((c) => {
      const r = byRole(c.from);
      return `<div class="rail-card cursor-pointer" onclick="scrollToMsg('${c.msgId}')">
        <div class="track-bar" style="background:${trackColorHex(c.track)}"></div>
        <div class="min-w-0 flex-1">
          <div class="text-[11px] uppercase tracking-wide text-slate-400">${c.kind} · ${r ? r.label : "?"}</div>
          <div class="text-sm font-semibold text-slate-100">${c.title}</div>
          <div class="mt-1 text-xs text-slate-300">${c.body}</div>
          <div class="mt-1 text-[10px] text-slate-500">${c.ts} · jump →</div>
        </div>
      </div>`;
    }).join("") || `<div class="text-xs text-slate-500">No artifacts pinned.</div>`;
  } else if (state.rail === "decisions") {
    const entries = Object.entries(state.humanDecisions);
    body.innerHTML = entries.length ? entries.map(([mid, info]) => {
      const m = MESSAGES.find((x) => x.id === mid);
      const decider = byRole(info.decider);
      return `<div class="rail-card cursor-pointer" onclick="scrollToMsg('${mid}')">
        <div class="track-bar" style="background:${trackColorHex(m.track)}"></div>
        <div class="min-w-0 flex-1">
          <div class="text-[11px] uppercase tracking-wide text-violet-300">decision · marked by ${decider ? decider.label : "?"}</div>
          <div class="mt-1 text-sm text-slate-100">${m.body.length > 140 ? m.body.slice(0,140) + "…" : m.body}</div>
          <div class="mt-1 text-[10px] text-slate-500">marked ${info.ts} · #${m.track} · jump →</div>
        </div>
      </div>`;
    }).join("") : `<div class="text-xs text-slate-500">Nothing marked yet. Click "+ mark for AAR" on any message to flag it for the post-mortem.</div>`;
  } else if (state.rail === "actions") {
    body.innerHTML = state.actionItems.map((a) => {
      const owner = byRole(a.owner);
      const m = MESSAGES.find((x) => x.id === a.msgId);
      const tone = a.status === "in_progress" ? "text-amber-200 border-amber-500/40 bg-amber-900/20"
                 : a.status === "done"        ? "text-emerald-200 border-emerald-500/40 bg-emerald-900/20"
                                              : "text-slate-300 border-slate-600 bg-slate-800/40";
      return `<div class="rail-card cursor-pointer" onclick="scrollToMsg('${a.msgId}')">
        <div class="track-bar" style="background:${trackColorHex(m ? m.track : 'main')}"></div>
        <div class="min-w-0 flex-1">
          <div class="flex items-center justify-between">
            <span class="text-sm font-semibold text-slate-100">${owner ? owner.label : "?"}</span>
            <span class="rounded px-1.5 py-0.5 text-[10px] font-semibold border ${tone}">${a.status.replace("_", " ").toUpperCase()}</span>
          </div>
          <div class="mt-1 text-xs text-slate-300">${a.text}</div>
          <div class="mt-1 text-[10px] text-slate-500">from ${a.msgId} · jump →</div>
        </div>
      </div>`;
    }).join("") || `<div class="text-xs text-slate-500">No action items.</div>`;
  } else {
    // Critical events
    const list = criticalList();
    body.innerHTML = list.length ? list.map((c) => `
      <div class="rail-card cursor-pointer border-red-500/40" onclick="scrollToMsg('${c.msgId}')">
        <div class="track-bar" style="background:#ef4444"></div>
        <div class="min-w-0 flex-1">
          <div class="text-[11px] uppercase tracking-wide text-red-300">inject</div>
          <div class="mt-1 text-sm text-slate-100">${c.body}</div>
          <div class="mt-1 text-[10px] text-slate-500">${c.ts} · jump →</div>
        </div>
      </div>`).join("") : `<div class="text-xs text-slate-500">No injects fired.</div>`;
  }
}

function toggleDecision(mid) {
  if (state.humanDecisions[mid]) delete state.humanDecisions[mid];
  else state.humanDecisions[mid] = { decider: VIEWER, ts: new Date().toLocaleTimeString().slice(0,8) };
  rerender();
}
window.toggleDecision = toggleDecision;

function rerender() { renderArtifactStrip(); renderChat(); renderRail(); }

document.querySelectorAll(".pill[data-filter]").forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".pill[data-filter]").forEach((x) => x.dataset.active = "0");
    b.dataset.active = "1";
    state.filter = b.dataset.filter;
    applyFilters();
  });
});
// Track pills are multi-select (SOC iter-2 ask): click toggles inclusion in
// the trackFilter Set so Containment + Lateral can be visible together,
// each pill independently. Filter is applied as OR within the set
// (any-of-selected) and AND against the quality filter.
document.querySelectorAll(".pill[data-track]").forEach((b) => {
  b.addEventListener("click", () => {
    const t = b.dataset.track;
    if (state.trackFilter.has(t)) {
      state.trackFilter.delete(t);
      b.dataset.active = "0";
    } else {
      state.trackFilter.add(t);
      b.dataset.active = "1";
    }
    applyFilters();
  });
});
document.querySelectorAll(".rail-tab").forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".rail-tab").forEach((x) => { x.classList.remove("text-slate-100","border-b-2","border-sky-500"); x.classList.add("text-slate-400"); });
    b.classList.add("text-slate-100", "border-b-2", "border-sky-500");
    b.classList.remove("text-slate-400");
    state.rail = b.dataset.rail;
    renderRail();
  });
});

// AAR-ready timeline export: minute anchors + track-opens + injects + decisions
// + pinned artifacts. Curated subset, in event order. IR Lead's iter-2 ask.
function exportTimelineMd() {
  const lines = [];
  lines.push("# Tabletop AAR timeline", "");
  lines.push("Ransomware exercise · turn 7/12 · " + new Date().toLocaleString());
  lines.push("");
  // Track opens
  const seen = new Set();
  const opens = [];
  for (const m of MESSAGES) {
    if (m.track !== "main" && !seen.has(m.track)) {
      seen.add(m.track);
      const r = byRole(m.from); const t = trackInfo(m.track);
      opens.push({ ts: m.ts, line: `- **${m.ts}** · #${m.track} (${t.label}) opened by ${r ? actorLabel(r) : "?"}` });
    }
  }
  lines.push("## Track lifecycle", "");
  for (const o of opens) lines.push(o.line);
  lines.push("");
  // Critical events
  const crits = MESSAGES.filter((m) => m.kind === "critical");
  if (crits.length) {
    lines.push("## Critical events (injects)", "");
    for (const c of crits) lines.push(`- **${c.ts}** · INJECT — ${c.body}`);
    lines.push("");
  }
  // Decisions
  const dec = Object.entries(state.humanDecisions);
  if (dec.length) {
    lines.push("## Decisions / AAR moments", "");
    for (const [mid, info] of dec) {
      const m = MESSAGES.find((x) => x.id === mid);
      const r = byRole(info.decider);
      lines.push(`- **${info.ts}** · #${m.track} · ${r ? actorLabel(r) : "?"} marked: "${m.body.replace(/\n/g, " ")}"`);
    }
    lines.push("");
  }
  // Pinned artifacts
  const arts = pinnedCards();
  if (arts.length) {
    lines.push("## Pinned artifacts", "");
    for (const a of arts) {
      const r = byRole(a.from);
      lines.push(`- **${a.ts}** · #${a.track} · ${r ? r.label : "?"} — **${a.title}**: ${a.body}`);
    }
    lines.push("");
  }
  // Action items
  if (state.actionItems.length) {
    lines.push("## Action items", "");
    for (const a of state.actionItems) {
      const r = byRole(a.owner);
      lines.push(`- [${a.status === "done" ? "x" : " "}] **${r ? r.label : "?"}** (${a.status.replace("_", " ")}): ${a.text} _(from ${a.msgId})_`);
    }
    lines.push("");
  }
  download("tabletop-timeline.md", lines.join("\n"));
}

// Full chronological dump of every message with track + role + ts + flags.
function exportFullMd() {
  const lines = ["# Tabletop full record", ""];
  lines.push("Ransomware exercise · turn 7/12 · " + new Date().toLocaleString(), "");
  let prev = "";
  for (const m of MESSAGES) {
    const minute = tsMinute(m.ts);
    if (minute !== prev) { lines.push("", `### ${minute}`, ""); prev = minute; }
    const r = byRole(m.from);
    const flags = [];
    if (m.kind === "critical") flags.push("INJECT");
    if (state.humanDecisions[m.id]) flags.push("DECISION");
    const flagStr = flags.length ? ` [${flags.join(", ")}]` : "";
    lines.push(`- **${m.ts}** · #${m.track} · ${r ? actorLabel(r) : "System"}${flagStr}: ${m.body.replace(/\n/g, " ")}`);
  }
  download("tabletop-full-record.md", lines.join("\n"));
}

function download(filename, content) {
  const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
}

document.getElementById("btn-export-timeline").addEventListener("click", exportTimelineMd);
document.getElementById("btn-export-full").addEventListener("click", exportFullMd);

renderViewerSwitcher();
rerender();
setTimeout(() => { const c = document.getElementById("chat"); c.scrollTop = c.scrollHeight; }, 50);
</script>
