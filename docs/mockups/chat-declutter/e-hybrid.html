<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mockup E · Hybrid (synthesis from iter-1)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css">
<style>
/* Sticky minute-boundary timestamp anchor — IR Lead's ask */
.ts-anchor {
  position: sticky; top: 0; z-index: 5;
  background: linear-gradient(to bottom, #0f172a 70%, transparent);
  padding: 4px 0;
  font-family: ui-monospace, monospace;
  font-size: 10px;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.ts-anchor::before {
  content: ""; display: inline-block; width: 100%; height: 1px;
  background: #1e293b; vertical-align: middle; margin-right: 8px;
}
/* Pinned artifacts strip across top — SOC + IR Lead ask */
.artifact-strip {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 8px 12px;
  border-bottom: 1px solid #1e293b;
  background: #0b1320;
  flex-shrink: 0;
}
.artifact-card-mini {
  flex: 0 0 220px;
  border: 1px solid #1e293b; border-left-width: 3px;
  background: #0f172a; border-radius: 4px;
  padding: 6px 8px; font-size: 11px;
  cursor: pointer;
}
.artifact-card-mini:hover { border-color: #475569; background: #1e293b; }
.artifact-card-mini .title { font-weight: 600; color: #e2e8f0; font-size: 12px; }
.artifact-card-mini .meta { color: #64748b; font-size: 10px; margin-top: 2px; }
/* Notification clocks widget — Legal ask */
.clock-row {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  border-bottom: 1px solid #1e293b;
  font-size: 11px;
}
.clock-jur { font-weight: 700; color: #e2e8f0; min-width: 60px; }
.clock-state { font-size: 10px; padding: 1px 6px; border-radius: 999px; }
.clock-pending { background: #1e293b; color: #94a3b8; }
.clock-active { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.4); }
/* Privilege banner / per-message marker */
.priv-banner {
  background: rgba(168, 85, 247, 0.1);
  border: 1px solid rgba(168, 85, 247, 0.3);
  color: #c4b5fd;
  padding: 4px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
}
.msg-priv { outline: 1px dashed rgba(168, 85, 247, 0.5); outline-offset: 1px; }
/* Human-marked decision affordance */
.btn-mark {
  font-size: 10px; padding: 2px 6px; border-radius: 4px;
  border: 1px solid #334155; background: transparent; color: #94a3b8;
  cursor: pointer;
}
.btn-mark:hover { background: #1e293b; color: #e2e8f0; border-color: #475569; }
.btn-mark.active { background: rgba(168, 85, 247, 0.15); color: #c4b5fd; border-color: #a855f7; }
/* "Since you last looked" banner — CISO ask */
.unread-banner {
  background: rgba(56, 189, 248, 0.12);
  border: 1px solid rgba(56, 189, 248, 0.4);
  color: #7dd3fc;
  padding: 6px 10px; border-radius: 4px;
  font-size: 12px; cursor: pointer;
}
</style>
</head>
<body class="text-slate-200">
<div class="flex h-screen flex-col">

<header class="flex items-center justify-between border-b border-slate-800 bg-slate-900/60 px-4 py-2">
  <div class="flex items-center gap-3">
    <span class="text-sm font-semibold text-slate-100">Crittable · Tabletop in progress</span>
    <span class="text-xs text-slate-400">Ransomware · turn 7/12</span>
    <span class="ml-2 rounded bg-emerald-900/60 px-2 py-0.5 text-[10px] font-semibold text-emerald-200">HYBRID — synthesis from iter 1</span>
  </div>
  <div class="flex items-center gap-3 text-xs">
    <span class="text-slate-400">Viewing as</span>
    <select id="viewer-switcher" class="rounded border border-slate-700 bg-slate-800 px-2 py-1 text-slate-100"></select>
    <a href="index.html" class="text-sky-400 hover:underline">← all mockups</a>
  </div>
</header>

<!-- Pinned artifacts strip — surfaces every pinned card across all tracks -->
<div class="artifact-strip" id="artifact-strip"></div>

<div class="flex flex-1 min-h-0">
  <!-- Center: filter row, optional unread banner, chat -->
  <main class="flex flex-1 min-w-0 flex-col">
    <!-- Filter row — track pill AND-s with quality filter, both can be active -->
    <div class="flex flex-wrap items-center gap-2 border-b border-slate-800 bg-slate-900/40 px-3 py-2">
      <span class="text-[11px] uppercase tracking-wide text-slate-500">Show</span>
      <button class="pill" data-filter="all" data-active="1">All <span class="count" id="cnt-all"></span></button>
      <button class="pill" data-filter="me">@Me <span class="count" id="cnt-me"></span></button>
      <button class="pill" data-filter="critical">Critical <span class="count" id="cnt-critical"></span></button>
      <button class="pill" data-filter="decisions">Decisions <span class="count" id="cnt-decisions"></span></button>
      <span class="mx-2 h-4 w-px bg-slate-700"></span>
      <span class="text-[11px] uppercase tracking-wide text-slate-500">AND track</span>
      <button class="pill" data-track="containment"><span style="color:#f43f5e">●</span> Containment</button>
      <button class="pill" data-track="disclosure"><span style="color:#f59e0b">●</span> Disclosure</button>
      <button class="pill" data-track="comms"><span style="color:#ec4899">●</span> Comms</button>
      <button class="pill" data-track="lateral"><span style="color:#14b8a6">●</span> Lateral</button>
      <span class="ml-auto text-[11px] text-slate-500" id="filter-summary">All messages</span>
    </div>

    <!-- "Since you last looked" banner — flashes after a filter change with the count of newly visible @-mentions -->
    <div id="unread-banner" class="m-3 hidden"></div>

    <!-- Chat scroll -->
    <div id="chat" class="flex-1 min-h-0 overflow-y-auto px-3 py-3 space-y-1"></div>

    <!-- Composer -->
    <div class="border-t border-slate-800 bg-slate-900/40 p-3">
      <div class="flex gap-2">
        <input class="flex-1 rounded border border-slate-700 bg-slate-800 px-3 py-2 text-sm placeholder-slate-500" placeholder="Type a reply…">
        <button class="rounded bg-sky-600 px-4 text-sm font-medium text-white hover:bg-sky-500">Send</button>
      </div>
    </div>
  </main>

  <!-- Right rail with 4 tabs: Artifacts | Decisions | Clocks | Privileged -->
  <aside class="w-80 flex-shrink-0 border-l border-slate-800 bg-slate-900/30 flex flex-col min-h-0">
    <div class="flex border-b border-slate-800 text-[11px]">
      <button class="rail-tab flex-1 px-2 py-2 font-semibold text-slate-100 border-b-2 border-sky-500" data-rail="artifacts">Artifacts</button>
      <button class="rail-tab flex-1 px-2 py-2 text-slate-400 hover:text-slate-200" data-rail="decisions">Decisions</button>
      <button class="rail-tab flex-1 px-2 py-2 text-slate-400 hover:text-slate-200" data-rail="clocks">Clocks</button>
      <button class="rail-tab flex-1 px-2 py-2 text-slate-400 hover:text-slate-200" data-rail="privileged">Privileged</button>
    </div>
    <div id="rail-body" class="flex-1 min-h-0 overflow-y-auto p-3 space-y-2"></div>
  </aside>
</div>
</div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
let state = {
  filter: "all",
  trackFilter: null,
  rail: "artifacts",
  // Human-marked decisions: msgId -> { decider: roleId, ts: clockTime }.
  // Pre-seed Legal-affirmed ones to mimic Diana already curating.
  humanDecisions: {
    m21: { decider: "legal", ts: "14:36:55" },
    m25: { decider: "ciso",  ts: "14:37:50" },
    m37: { decider: "ciso",  ts: "14:41:20" },
  },
  // Privileged messages — Legal-set
  privileged: new Set(["m07", "m08", "m15", "m21", "m24", "m29", "m30", "m35"]),
};

// Notification-clock state. Triggered when m21 fires (HR data on FS-CORP-07).
function clockState() {
  const triggered = MESSAGES.find((m) => m.id === "m21");
  const t = triggered ? triggered.ts : null;
  return [
    { jur: "CA",    rule: "SB-1386 / CCPA — without unreasonable delay", state: t ? "active" : "pending", since: t },
    { jur: "NY",    rule: "SHIELD Act — without unreasonable delay",     state: t ? "active" : "pending", since: t },
    { jur: "IL",    rule: "PIPA — most expedient time possible",          state: t ? "active" : "pending", since: t },
    { jur: "HIPAA", rule: "60d from discovery (PHI scope pending)",       state: t ? "active" : "pending", since: t },
  ];
}

function tsMinute(ts) { return ts.slice(0, 5); } // "14:30:02" -> "14:30"

function chatItem(m, prevMinute) {
  const role = byRole(m.from) || { label: "System", color: "slate" };
  const [bg, bd, tx] = tailwindColor(role.color);
  const trackHex = trackColorHex(m.track);
  const isMe = isAddressedToMe(m, VIEWER);
  const isCritical = m.kind === "critical";
  const minute = tsMinute(m.ts);
  // Sticky minute-anchor row when minute changes
  const anchor = (minute !== prevMinute) ? `<div class="ts-anchor">${minute}</div>` : "";
  const isHumanDecision = !!state.humanDecisions[m.id];
  const isPriv = state.privileged.has(m.id);
  const ringCls = isMe && (m.kind === "ai_text" || isCritical) ? "awaiting-me" : "";
  const privCls = isPriv ? "msg-priv" : "";
  const critCls = isCritical ? "border-red-500/60 bg-red-950/40" : "border-slate-800 bg-slate-900/40";
  const meBadge = isMe ? `<span class="ml-2 rounded bg-amber-500/20 px-1.5 py-0.5 text-[10px] font-semibold text-amber-200">@you</span>` : "";
  const decBadge = isHumanDecision
    ? `<span class="ml-2 rounded border border-violet-500/60 bg-violet-900/40 px-1.5 py-0.5 text-[10px] font-semibold text-violet-200" title="Marked decision by ${(byRole(state.humanDecisions[m.id].decider)||{}).label} at ${state.humanDecisions[m.id].ts}">DECISION · ${(byRole(state.humanDecisions[m.id].decider)||{}).short}</span>`
    : "";
  const critBadge = isCritical ? `<span class="ml-2 rounded border border-red-500/60 bg-red-900/40 px-1.5 py-0.5 text-[10px] font-semibold text-red-200">INJECT</span>` : "";
  const privBadge = isPriv ? `<span class="ml-2 rounded border border-violet-400/50 bg-violet-900/30 px-1.5 py-0.5 text-[10px] font-semibold text-violet-200" title="Marked privileged / attorney work product by Legal">PRIV/WP</span>` : "";
  // Viewer-conditional affordances:
  // Mark-as-decision: visible to CISO + Legal only.
  // Mark-as-privileged: visible to Legal only.
  const canMarkDecision = ["ciso", "legal"].includes(VIEWER);
  const canMarkPriv     = VIEWER === "legal";
  const decisionBtn = canMarkDecision
    ? `<button class="btn-mark ${isHumanDecision ? "active" : ""}" onclick="toggleDecision('${m.id}')">${isHumanDecision ? "✓ decision" : "+ mark decision"}</button>`
    : "";
  const privBtn = canMarkPriv
    ? `<button class="btn-mark ${isPriv ? "active" : ""}" onclick="togglePriv('${m.id}')">${isPriv ? "✓ priv/WP" : "+ mark priv"}</button>`
    : "";
  return anchor + `
    <article id="msg-${m.id}" class="flex gap-3 rounded border ${critCls} ${ringCls} ${privCls} p-3"
      data-mid="${m.id}" data-track="${m.track}" data-me="${isMe?1:0}"
      data-critical="${isCritical?1:0}" data-decision="${isHumanDecision?1:0}">
      <div class="track-bar" style="background:${trackHex}"></div>
      <div class="avatar ${bg} ${bd} ${tx} border">${initials(role)}</div>
      <div class="min-w-0 flex-1">
        <header class="flex flex-wrap items-center justify-between gap-2 text-[11px] uppercase tracking-wide text-slate-400">
          <span class="flex flex-wrap items-center gap-1">
            <span class="font-semibold text-slate-200">${actorLabel(role)}</span>
            <span class="track-chip track-${m.track}">${trackInfo(m.track).label}</span>
            ${meBadge}${decBadge}${critBadge}${privBadge}
          </span>
          <span class="font-mono text-slate-500">${m.ts}</span>
        </header>
        <p class="mt-1 whitespace-pre-wrap text-sm leading-relaxed">${renderBody(m, VIEWER)}</p>
        <div class="mt-2 flex items-center gap-2">${decisionBtn}${privBtn}</div>
      </div>
    </article>`;
}

function renderArtifactStrip() {
  const cards = pinnedCards();
  document.getElementById("artifact-strip").innerHTML = cards.length
    ? cards.map((c) => {
        const r = byRole(c.from);
        return `<div class="artifact-card-mini" style="border-left-color:${trackColorHex(c.track)}" onclick="scrollToMsg('${c.msgId}')">
          <div class="title">${c.title}</div>
          <div class="text-[11px] text-slate-300 mt-0.5">${c.body}</div>
          <div class="meta">${c.ts} · ${r ? r.label : "?"} · #${c.track}</div>
        </div>`;
      }).join("")
    : `<span class="text-xs text-slate-500 px-2 py-1">No artifacts pinned yet.</span>`;
}

function renderChat() {
  let prevMinute = "";
  const html = MESSAGES.map((m) => { const out = chatItem(m, prevMinute); prevMinute = tsMinute(m.ts); return out; }).join("");
  document.getElementById("chat").innerHTML = html;
  applyFilters();
}

function applyFilters() {
  const items = document.querySelectorAll("#chat > article");
  let cAll = 0, cMe = 0, cCrit = 0, cDec = 0, cVisible = 0;
  items.forEach((el) => {
    const me = el.dataset.me === "1";
    const crit = el.dataset.critical === "1";
    const dec = el.dataset.decision === "1";
    const trk = el.dataset.track;
    cAll++; if (me) cMe++; if (crit) cCrit++; if (dec) cDec++;
    let show = true;
    if (state.filter === "me" && !me) show = false;
    if (state.filter === "critical" && !crit) show = false;
    if (state.filter === "decisions" && !dec) show = false;
    if (state.trackFilter && trk !== state.trackFilter) show = false;
    el.classList.toggle("hidden-by-filter", !show);
    if (show) cVisible++;
  });
  document.getElementById("cnt-all").textContent = cAll;
  document.getElementById("cnt-me").textContent = cMe;
  document.getElementById("cnt-critical").textContent = cCrit;
  document.getElementById("cnt-decisions").textContent = cDec;
  // Filter summary line
  const parts = [];
  if (state.filter !== "all") parts.push(state.filter);
  if (state.trackFilter) parts.push("#" + state.trackFilter);
  document.getElementById("filter-summary").textContent = parts.length ? `${cVisible} of ${cAll} · ${parts.join(" + ")}` : `${cAll} messages`;
}

function renderRail() {
  const body = document.getElementById("rail-body");
  if (state.rail === "artifacts") {
    body.innerHTML = pinnedCards().map((c) => {
      const r = byRole(c.from);
      return `<div class="rail-card cursor-pointer" onclick="scrollToMsg('${c.msgId}')">
        <div class="track-bar" style="background:${trackColorHex(c.track)}"></div>
        <div class="min-w-0 flex-1">
          <div class="text-[11px] uppercase tracking-wide text-slate-400">${c.kind} · ${r ? r.label : "?"}</div>
          <div class="text-sm font-semibold text-slate-100">${c.title}</div>
          <div class="mt-1 text-xs text-slate-300">${c.body}</div>
          <div class="mt-1 text-[10px] text-slate-500">${c.ts} · jump →</div>
        </div>
      </div>`;
    }).join("") || `<div class="text-xs text-slate-500">No artifacts pinned.</div>`;
  } else if (state.rail === "decisions") {
    const entries = Object.entries(state.humanDecisions);
    body.innerHTML = entries.length ? entries.map(([mid, info]) => {
      const m = MESSAGES.find((x) => x.id === mid);
      const decider = byRole(info.decider);
      return `<div class="rail-card cursor-pointer" onclick="scrollToMsg('${mid}')">
        <div class="track-bar" style="background:${trackColorHex(m.track)}"></div>
        <div class="min-w-0 flex-1">
          <div class="text-[11px] uppercase tracking-wide text-violet-300">decision · marked by ${decider ? decider.label : "?"}</div>
          <div class="mt-1 text-sm text-slate-100">${m.body.length > 140 ? m.body.slice(0,140) + "…" : m.body}</div>
          <div class="mt-1 text-[10px] text-slate-500">marked ${info.ts} · #${m.track} · jump →</div>
        </div>
      </div>`;
    }).join("") : `<div class="text-xs text-slate-500">No decisions marked. CISO and Legal can mark messages with the "+ mark decision" button.</div>`;
  } else if (state.rail === "clocks") {
    const triggered = clockState()[0].state === "active";
    body.innerHTML = `
      <div class="${triggered ? "priv-banner" : "rail-card"}">
        ${triggered
          ? `Notification clock TRIGGERED — HR data on FS-CORP-07 (Legal-marked decision m21, 14:36:50). Counsel has been engaged.`
          : `No notification trigger yet.`}
      </div>
      ${clockState().map((c) => `
        <div class="clock-row">
          <span class="clock-jur">${c.jur}</span>
          <span class="clock-state ${c.state === "active" ? "clock-active" : "clock-pending"}">${c.state.toUpperCase()}</span>
          <span class="text-[11px] text-slate-400">${c.rule}${c.since ? ` · since ${c.since}` : ""}</span>
        </div>
      `).join("")}
      <div class="text-[10px] text-slate-500 px-2 mt-2">Triggered timestamps stamp the AAR. Legal owns this widget.</div>
    `;
  } else {
    // Privileged tab — only Legal can edit; other viewers see redacted preview
    if (VIEWER !== "legal") {
      body.innerHTML = `<div class="rail-card text-xs text-slate-400">${state.privileged.size} messages flagged Privileged / Attorney Work Product. <br><br>Visible only to Legal. Other roles see the chat content but cannot toggle privilege state.</div>`;
    } else {
      const ids = [...state.privileged];
      body.innerHTML = ids.length ? ids.map((mid) => {
        const m = MESSAGES.find((x) => x.id === mid);
        if (!m) return "";
        const r = byRole(m.from);
        return `<div class="rail-card cursor-pointer msg-priv" onclick="scrollToMsg('${mid}')">
          <div class="min-w-0 flex-1">
            <div class="text-[11px] uppercase tracking-wide text-violet-300">priv/WP · ${r ? r.label : "?"}</div>
            <div class="mt-1 text-xs text-slate-200">${m.body.length > 120 ? m.body.slice(0,120) + "…" : m.body}</div>
            <div class="mt-1 text-[10px] text-slate-500">${m.ts} · #${m.track} · jump →</div>
          </div>
        </div>`;
      }).join("") : `<div class="text-xs text-slate-500">No messages marked priv/WP yet.</div>`;
    }
  }
}

function toggleDecision(mid) {
  if (state.humanDecisions[mid]) delete state.humanDecisions[mid];
  else state.humanDecisions[mid] = { decider: VIEWER, ts: new Date().toLocaleTimeString().slice(0,8) };
  rerender();
}
function togglePriv(mid) {
  if (state.privileged.has(mid)) state.privileged.delete(mid);
  else state.privileged.add(mid);
  rerender();
}
window.toggleDecision = toggleDecision;
window.togglePriv = togglePriv;

function rerender() { renderArtifactStrip(); renderChat(); renderRail(); }

document.querySelectorAll(".pill[data-filter]").forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".pill[data-filter]").forEach((x) => x.dataset.active = "0");
    b.dataset.active = "1";
    state.filter = b.dataset.filter;
    applyFilters();
  });
});
document.querySelectorAll(".pill[data-track]").forEach((b) => {
  b.addEventListener("click", () => {
    const t = b.dataset.track;
    if (state.trackFilter === t) { state.trackFilter = null; b.dataset.active = "0"; }
    else {
      state.trackFilter = t;
      document.querySelectorAll(".pill[data-track]").forEach((x) => x.dataset.active = "0");
      b.dataset.active = "1";
    }
    applyFilters();
  });
});
document.querySelectorAll(".rail-tab").forEach((b) => {
  b.addEventListener("click", () => {
    document.querySelectorAll(".rail-tab").forEach((x) => { x.classList.remove("text-slate-100","border-b-2","border-sky-500"); x.classList.add("text-slate-400"); });
    b.classList.add("text-slate-100", "border-b-2", "border-sky-500");
    b.classList.remove("text-slate-400");
    state.rail = b.dataset.rail;
    renderRail();
  });
});

renderViewerSwitcher();
rerender();
setTimeout(() => { const c = document.getElementById("chat"); c.scrollTop = c.scrollHeight; }, 50);
</script>
</body>
</html>
